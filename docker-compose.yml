services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
      POSTGRES_DB: shop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: src/Shop.Api/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Host=db;Port=5432;Database=shop;Username=shop;Password=shop"
      Jwt__Key: "docker-compose-signing-key-change-me-at-least-32-bytes"
      Sweeper__IntervalSeconds: "60"
      Sweeper__DraftExpiryMinutes: "30"
    ports:
      - "8080:8080"

volumes:
  pgdata:
